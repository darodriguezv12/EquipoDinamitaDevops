version: 0.2

env:
  shell: bash
  variables:
    AWS_DEFAULT_REGION: us-east-1
    IMAGE_REPO_URI: 383962123552.dkr.ecr.us-east-1.amazonaws.com/proyecto

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing Python dependencies"
      - python -m pip install --upgrade pip
      - python -m pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Running unit tests"
      - python -m pytest tests -q
      - echo "Logging in to Amazon ECR"
      - ECR_REGISTRY="$(echo "$IMAGE_REPO_URI" | cut -d/ -f1)"
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

  build:
    commands:
      - IMAGE_TAG="$(echo "${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}" | cut -c 1-7)"
      - echo "Building Docker image ${IMAGE_REPO_URI}:${IMAGE_TAG}"
      - docker build -t "${IMAGE_REPO_URI}:${IMAGE_TAG}" -t "${IMAGE_REPO_URI}:latest" .

  post_build:
    commands:
      - IMAGE_TAG="$(echo "${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}" | cut -c 1-7)"
      - echo "Pushing Docker image to ECR"
      - docker push "${IMAGE_REPO_URI}:${IMAGE_TAG}"
      - docker push "${IMAGE_REPO_URI}:latest"
      - printf 'IMAGE_REPO_URI=%s\nIMAGE_TAG=%s\nIMAGE_URI=%s:%s\n' "$IMAGE_REPO_URI" "$IMAGE_TAG" "$IMAGE_REPO_URI" "$IMAGE_TAG" > image-detail.env
      - echo "Container image published to ECR"

artifacts:
  files:
    - '**/*'
