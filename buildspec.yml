version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo Installing dependencies
      - python -m pip install --upgrade pip
      - python -m pip install -r requirements.txt
  pre_build:
    commands:
      - echo Running unit tests
      - python -m pytest tests -q
  build:
    commands:
      - echo Packaging application artifact
      - zip -r beanstalk.zip app nginx test tests run.py requirements.txt Dockerfile docker-compose.yml docker-compose.local.yaml

artifacts:
  files:
    - beanstalk.zip
  discard-paths: yes
