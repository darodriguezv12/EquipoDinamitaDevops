version: 0.2

env:
  shell: bash
  variables:
    AWS_DEFAULT_REGION: us-east-1
    IMAGE_REPO_URI: 383962123552.dkr.ecr.us-east-1.amazonaws.com/proyecto-1-blacklist-api-dev
    CONTAINER_NAME: app
    ECS_CLUSTER_NAME: blacklist-api-dev-cluster
    ECS_SERVICE_NAME: blacklist-api-dev-service

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing Python dependencies"
      - python -m pip install --upgrade pip
      - python -m pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Running unit tests"
      - python -m pytest tests -q
      - echo "Logging in to Amazon ECR"
      - ECR_REGISTRY="$(echo "$IMAGE_REPO_URI" | cut -d/ -f1)"
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

  build:
    commands:
      - IMAGE_TAG="$(echo "${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}" | cut -c 1-7)"
      - IMAGE_URI="${IMAGE_REPO_URI}:${IMAGE_TAG}"
      - echo "Building Docker image ${IMAGE_URI}"
      - docker build --platform linux/amd64 -t "${IMAGE_URI}" -t "${IMAGE_REPO_URI}:latest" .

  post_build:
    commands:
      - IMAGE_TAG="$(echo "${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}" | cut -c 1-7)"
      - IMAGE_URI="${IMAGE_REPO_URI}:${IMAGE_TAG}"
      - echo "Pushing Docker image to ECR"
      - docker push "${IMAGE_URI}"
      - docker push "${IMAGE_REPO_URI}:latest"
      - printf '{"ImageURI":"%s"}\n' "$IMAGE_URI" > imageDetail.json
      - |
        cat > appspec.json <<EOF
        {
          "version": 0.0,
          "Resources": [
            {
              "TargetService": {
                "Type": "AWS::ECS::Service",
                "Properties": {
                  "TaskDefinition": "<TASK_DEFINITION>",
                  "LoadBalancerInfo": {
                    "ContainerName": "${CONTAINER_NAME}",
                    "ContainerPort": 5000
                  }
                }
              }
            }
          ]
        }
        EOF
      - TASK_DEFINITION_ARN="$(aws ecs describe-services --cluster "$ECS_CLUSTER_NAME" --services "$ECS_SERVICE_NAME" --query 'services[0].taskDefinition' --output text)"
      - echo "Generating taskdef.json from ${TASK_DEFINITION_ARN}"
      - aws ecs describe-task-definition --task-definition "$TASK_DEFINITION_ARN" --query taskDefinition > taskdef-source.json
      - |
        jq --arg container "$CONTAINER_NAME" '
          del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy,
            .deregisteredAt
          )
          | .containerDefinitions |= map(
              if .name == $container then .image = "<IMAGE1_NAME>" else . end
            )
        ' taskdef-source.json > taskdef.json
      - echo "Build artifacts ready for CodeDeploy ECS Blue/Green"

artifacts:
  files:
    - appspec.json
    - taskdef.json
    - imageDetail.json
