version: "3.9"

services:
  web:
    image: __WEB_IMAGE__
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_TOKEN: ${API_TOKEN}
      DB_INIT_RETRIES: ${DB_INIT_RETRIES:-5}
      DB_INIT_DELAY: ${DB_INIT_DELAY:-2}

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${EB_LOG_BASE_DIR}/nginx:/var/log/nginx
    depends_on:
      - web
