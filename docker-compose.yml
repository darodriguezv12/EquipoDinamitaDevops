version: "3.9"

services:
  web:
    build: .
    expose:
      - "5000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_TOKEN: ${API_TOKEN}
      DB_INIT_RETRIES: ${DB_INIT_RETRIES}
      DB_INIT_DELAY: ${DB_INIT_DELAY}

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
